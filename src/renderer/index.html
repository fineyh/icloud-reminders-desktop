<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iCloud 提醒事项</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <!-- Title Bar -->
  <div class="titlebar">
    <span class="titlebar-title">iCloud 提醒事项</span>
    <div class="titlebar-buttons">
      <button class="titlebar-btn" id="btn-close" title="关闭">&#x2715;</button>
    </div>
  </div>

  <div class="panel-content" style="position: relative;">
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- Login View -->
    <section class="view" id="login-view">
      <div class="login-header">
        <h2>登录 iCloud</h2>
        <p>使用 Apple ID 查看您的提醒事项</p>
      </div>
      <form class="login-form" id="login-form">
        <div class="input-group">
          <label for="email">Apple ID（邮箱或手机号）</label>
          <input type="text" id="email" placeholder="手机号 / example@icloud.com" autocomplete="username" required>
        </div>
        <div class="input-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="输入密码" autocomplete="current-password" required>
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="remember" checked>
          <label for="remember">记住我</label>
        </div>
        <button type="submit" class="btn btn-primary" id="btn-login">登录</button>
        <div class="error-msg" id="login-error"></div>
      </form>
    </section>

    <!-- 2FA View -->
    <section class="view" id="twofa-view">
      <div class="twofa-header">
        <h2>双重认证</h2>
        <p>请输入发送到您受信任设备上的验证码</p>
      </div>
      <div class="code-input-wrapper" id="code-inputs">
        <input type="text" maxlength="1" data-index="0" inputmode="numeric">
        <input type="text" maxlength="1" data-index="1" inputmode="numeric">
        <input type="text" maxlength="1" data-index="2" inputmode="numeric">
        <input type="text" maxlength="1" data-index="3" inputmode="numeric">
        <input type="text" maxlength="1" data-index="4" inputmode="numeric">
        <input type="text" maxlength="1" data-index="5" inputmode="numeric">
      </div>
      <button class="btn btn-primary" id="btn-verify">验证</button>
      <div class="error-msg" id="twofa-error"></div>
      <button class="btn btn-text" id="btn-back-login" style="margin-top: 12px;">返回登录</button>
    </section>

    <!-- Settings View -->
    <section class="view" id="settings-view">
      <div class="settings-header">
        <button class="settings-back-btn" id="btn-settings-back">&#x2190;</button>
        <h3>设置</h3>
      </div>
      <div class="settings-body">
        <div class="settings-item">
          <div class="settings-item-info">
            <span class="settings-item-label">开机自启动</span>
            <span class="settings-item-desc">登录 Windows 时自动启动应用</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-auto-launch">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-item">
          <div class="settings-item-info">
            <span class="settings-item-label">到期提醒通知</span>
            <span class="settings-item-desc">提醒事项到期时弹出桌面通知</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-notifications">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-item">
          <div class="settings-item-info">
            <span class="settings-item-label">今日待办汇总</span>
            <span class="settings-item-desc">每天首次加载时通知当天到期的事项</span>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-daily-summary">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="settings-item">
          <div class="settings-item-info">
            <span class="settings-item-label">外观模式</span>
            <span class="settings-item-desc">切换亮色 / 暗色主题</span>
          </div>
          <select class="theme-select" id="select-dark-mode">
            <option value="system">跟随系统</option>
            <option value="light">浅色</option>
            <option value="dark">深色</option>
          </select>
        </div>
        <div class="settings-divider"></div>
        <div class="settings-item">
          <div class="settings-item-info">
            <span class="settings-item-label">当前版本</span>
            <span class="settings-item-desc" id="app-version">--</span>
          </div>
          <button class="btn btn-small" id="btn-check-update">检查更新</button>
        </div>
        <div class="update-status" id="update-status" style="display: none;">
          <span class="update-status-text" id="update-status-text"></span>
          <div class="update-progress" id="update-progress" style="display: none;">
            <div class="update-progress-bar" id="update-progress-bar"></div>
          </div>
          <button class="btn btn-small btn-primary" id="btn-update-download" style="display: none;">下载更新</button>
          <button class="btn btn-small btn-primary" id="btn-update-install" style="display: none;">立即安装</button>
        </div>
      </div>
    </section>

    <!-- Reminders View -->
    <section class="view" id="reminders-view">
      <div class="reminders-header">
        <h3 id="current-list-title">提醒事项</h3>
        <div class="header-actions">
          <button class="header-btn" id="btn-add" title="快速添加 (Ctrl+Alt+N)">&#x2795;</button>
          <button class="header-btn" id="btn-refresh" title="刷新">&#x21BB;</button>
          <button class="header-btn" id="btn-pin" title="置顶">&#x1F4CC;</button>
          <button class="header-btn" id="btn-mini" title="迷你窗口">&#x2750;</button>
          <div style="position: relative;">
            <button class="header-btn" id="btn-menu" title="菜单">&#x22EE;</button>
            <div class="dropdown-menu" id="dropdown-menu">
              <button class="dropdown-item" id="btn-settings">设置</button>
              <button class="dropdown-item danger" id="btn-logout">退出登录</button>
            </div>
          </div>
        </div>
      </div>
      <div class="search-bar" id="search-bar">
        <input type="text" id="search-input" placeholder="搜索提醒事项..." autocomplete="off">
        <button class="search-clear" id="search-clear" style="display:none;">&#x2715;</button>
      </div>
      <div class="smart-tabs" id="smart-tabs"></div>
      <div class="list-tabs" id="list-tabs"></div>
      <div class="reminders-list" id="reminders-list"></div>
      <div class="completed-section" id="completed-section" style="display: none;">
        <button class="completed-toggle" id="completed-toggle">
          <span class="arrow">&#x25B6;</span>
          <span>已完成 (<span id="completed-count">0</span>)</span>
        </button>
        <div class="completed-items" id="completed-items"></div>
      </div>
      <div class="status-bar">
        <span id="last-updated">--</span>
        <span id="item-count">--</span>
      </div>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
